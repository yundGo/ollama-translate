<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-top">
        <h2>Local Translate</h2>
        <div class="header-actions">
          <label class="toggle">
            <input type="checkbox" id="toggleAuto" />
            <span class="toggle-slider"></span>
          </label>
          <button id="btnSettings" class="btn-icon" title="设置">⚙️</button>
        </div>
      </div>
      <div class="domain-row">
        <span class="domain" id="domain"></span>
        <span class="toggle-label" id="toggleLabel">自动翻译</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">
        翻译区域 (XPath)
        <span class="badge" id="xpathCount">0</span>
      </div>
      <div id="xpathList" class="xpath-list"></div>
      <div class="add-row">
        <input type="text" id="xpathInput" placeholder="输入 XPath，如 /html/body/div[1]/main" />
        <button id="btnAdd" class="btn btn-primary">添加</button>
      </div>
      <button id="btnPick" class="btn btn-secondary">🎯 选取页面元素</button>
    </div>

    <div class="section">
      <div class="section-title">排除区域 (CSS 选择器)</div>
      <div id="excludeList" class="xpath-list"></div>
      <div class="add-row">
        <input type="text" id="excludeInput" placeholder="如 .pub-pre-copy-container, pre, code" />
        <button id="btnAddExclude" class="btn btn-primary">添加</button>
      </div>
    </div>

    <div class="actions">
      <button id="btnTranslate" class="btn btn-primary btn-full">翻译当前页面</button>
    </div>

    <div class="footer">
      <span class="status" id="statusBackend">检查后端连接...</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
