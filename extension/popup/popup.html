<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-top">
        <h2>Ollama Translate</h2>
        <button id="btnSettings" class="btn-icon" title="设置">⚙️</button>
      </div>
      <span class="domain" id="domain"></span>
    </div>

    <div class="section">
      <div class="section-title">
        翻译区域 (XPath)
        <span class="badge" id="xpathCount">0</span>
      </div>
      <div id="xpathList" class="xpath-list"></div>
    </div>

    <div class="section">
      <div class="add-row">
        <input type="text" id="xpathInput" placeholder="输入 XPath，如 /html/body/div[1]/main" />
        <button id="btnAdd" class="btn btn-primary">添加</button>
      </div>
      <button id="btnPick" class="btn btn-secondary">🎯 选取页面元素</button>
    </div>

    <div class="actions">
      <button id="btnTranslate" class="btn btn-primary btn-full">翻译当前页面</button>
    </div>

    <div class="footer">
      <span class="hint">设置入口：点击顶部 ⚙️ 或右键扩展图标 → 选项</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
